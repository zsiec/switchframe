name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install UI deps
        run: cd ui && npm ci
      - name: Svelte check
        run: cd ui && npx svelte-check --tsconfig ./tsconfig.json

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum
      - name: Install cgo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavcodec-dev libavutil-dev libx264-dev libfdk-aac-dev pkg-config
      - name: Vet
        run: cd server && go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.10.1
          working-directory: server

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum
      - name: Install cgo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavcodec-dev libavutil-dev libx264-dev libfdk-aac-dev pkg-config
      - name: Run tests with coverage
        run: cd server && go test ./... -race -coverprofile=coverage.out
      - name: Transition benchmarks
        run: cd server && go test ./transition/... -bench=. -benchmem -benchtime=3s
      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install deps
        run: cd ui && npm ci
      - name: Unit tests with coverage
        run: cd ui && npx vitest run --coverage
      - name: Upload UI coverage
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: ui/coverage/
      - name: Install Playwright
        run: cd ui && npx playwright install --with-deps chromium
      - name: E2E tests
        run: cd ui && npx playwright test

  docker:
    needs: [test-go, test-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t switchframe:ci .
